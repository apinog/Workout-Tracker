<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Alberto — Weekly Tracker</title>

<!-- PWA: makes it behave as a standalone app on iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">

<!-- App icon for iPhone home screen (generated inline as SVG → PNG via canvas) -->
<link rel="apple-touch-icon" id="appIcon" href="">

<script>
// Generate a crisp app icon as a data URL and inject it before anything loads
(function() {
  const size = 512;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, size, size);
  // Accent bar
  ctx.fillStyle = '#c8f04a';
  ctx.fillRect(60, 60, 16, 392);
  // "W" letter
  ctx.fillStyle = '#c8f04a';
  ctx.font = 'bold 320px Arial Black, Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('W', 90, 280);
  // Small subtitle
  ctx.fillStyle = '#666666';
  ctx.font = '500 52px Arial';
  ctx.fillText('WORKOUT', 90, 430);
  const dataUrl = c.toDataURL('image/png');
  document.getElementById('appIcon').href = dataUrl;
})();
</script>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #242424;
    --accent: #c8f04a;
    --accent-dim: #8aaa2a;
    --text: #e8e8e8;
    --muted: #666;
    --danger: #ff4444;
    --warn: #f0a500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 0;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 3px;
    text-transform: uppercase;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .week-nav button {
    background: var(--border);
    border: none;
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .week-nav button:hover { background: #333; }

  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 1px;
    min-width: 60px;
    text-align: center;
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 16px 24px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    scrollbar-width: none;
  }

  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .day-tab:hover { border-color: #444; color: var(--text); }

  .day-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
    font-weight: 500;
  }

  .day-tab.rest {
    opacity: 0.5;
    cursor: default;
  }

  .day-tab.completed {
    border-color: var(--accent-dim);
    color: var(--accent-dim);
  }

  .day-tab.completed::after {
    content: ' ✓';
  }

  .content {
    padding: 24px;
    max-width: 800px;
    margin: 0 auto;
  }

  .day-header {
    margin-bottom: 24px;
  }

  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .day-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .day-note {
    margin-top: 12px;
    padding: 10px 14px;
    background: #1a1a0a;
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #b8c8a0;
    font-style: italic;
    line-height: 1.5;
  }

  .block {
    margin-bottom: 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .block-header {
    padding: 12px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .block-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .block-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .exercise-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
  }

  .exercise-row:last-child { border-bottom: none; }

  .exercise-row.superset-a { border-left: 3px solid #3a6ea8; }
  .exercise-row.superset-b { border-left: 3px solid #8a4ea8; }

  .ex-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ex-prefix {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--border);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .ex-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .ex-note {
    font-size: 11px;
    color: #666;
    font-style: italic;
    line-height: 1.4;
  }

  .ex-inputs {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 160px;
  }

  .set-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .set-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .set-input {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 5px 8px;
    width: 62px;
    text-align: center;
    transition: border-color 0.15s;
    -moz-appearance: textfield;
  }

  .set-input::-webkit-outer-spin-button,
  .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .set-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .set-input.filled {
    border-color: #333;
    color: var(--accent);
  }

  .set-divider {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }

  .add-set-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 5px;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
    width: 100%;
    margin-top: 2px;
  }

  .add-set-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .complete-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: var(--black);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.15s;
  }

  .complete-btn:hover {
    background: #d8ff5a;
    transform: translateY(-1px);
  }

  .complete-btn.done {
    background: var(--border);
    color: var(--muted);
    cursor: default;
    transform: none;
  }

  .rowing-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .rowing-field {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }

  .rowing-field-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .rowing-field-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .rowing-input {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 8px 10px;
    width: 100%;
    transition: border-color 0.15s;
  }

  .rowing-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .rowing-input.filled {
    border-color: #333;
    color: var(--accent);
  }

  .rowing-input:disabled { opacity: 0.6; }

  .rowing-unit {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .rest-day {
    text-align: center;
    padding: 60px 24px;
  }

  .rest-day h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .rest-day p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #444;
    letter-spacing: 1px;
  }

  .tennis-day {
    text-align: center;
    padding: 60px 24px;
  }

  .tennis-day h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .tennis-day p {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 3px;
    margin-top: 16px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .week-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .injury-banner {
    background: #1a0a0a;
    border: 1px solid #3a1a1a;
    border-left: 3px solid var(--warn);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-bottom: 20px;
    font-size: 12px;
    color: #c8a080;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  .ex-meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    flex-wrap: wrap;
  }

  .fatigue-select {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    font-size: 12px;
    padding: 3px 6px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }

  .fatigue-select:focus { outline: none; border-color: var(--accent); }
  .fatigue-select.has-value { border-color: #444; color: var(--text); }
  .fatigue-select:disabled { opacity: 0.5; cursor: default; }

  .dp-tag {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .dp-tag:hover { border-color: #555; color: var(--text); }

  .dp-tag.active {
    background: #1a2a0a;
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .ex-unit-toggle {
    display: flex;
    gap: 2px;
    background: var(--black);
    border-radius: 4px;
    padding: 2px;
  }

  .ex-unit-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 3px 6px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ex-unit-btn.active {
    background: var(--accent);
    color: var(--black);
    font-weight: 500;
  }

  .ex-unit-btn:disabled {
    cursor: default;
    opacity: 0.5;
  }

  .sets-header {
    display: flex;
    gap: 6px;
    margin-bottom: 4px;
    padding-left: 26px;
    align-items: center;
  }

  .sets-header span {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    width: 62px;
    text-align: center;
  }

  .unit-toggle {
    display: flex;
    align-items: center;
    background: var(--border);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
    flex-shrink: 0;
  }

  .unit-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .unit-btn.active {
    background: var(--accent);
    color: var(--black);
    font-weight: 500;
  }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .content { padding: 16px; }
    .day-tabs { padding: 12px 16px; }
    .exercise-row { grid-template-columns: 1fr; }
    .ex-inputs { min-width: unset; }
    .week-summary { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Alberto — Tracker</h1>
    <p>Full Body Block · Back Recovery Phase</p>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹</button>
      <span class="week-label" id="weekLabel">WK 1</span>
      <button onclick="changeWeek(1)">›</button>
    </div>
  </div>
</header>

<div class="day-tabs" id="dayTabs"></div>

<div class="content">
  <div class="week-summary" id="weekSummary"></div>
  <div id="dayContent"></div>
</div>

        exercises: [
          { id: 'thu_c1', prefix: 'A', name: 'KB Swing', sets: 3, reps: '12', note: 'Light KB. Hip hinge only — if piriformis pulls, drop this.' },
          { id: 'thu_c2', prefix: 'B', name: 'Dumbbell Bench Press', sets: 3, reps: '10–12', note: 'Moderate weight.' },
        ]
      },
      {
        label: 'BLOCK D', type: 'Superset: Core + Isolation',
        exercises: [
          { id: 'thu_d1', prefix: 'A', name: 'Ab Wheel Rollout', sets: 3, reps: '8', note: 'Only if back feels okay. Stop if any pull.' },
          { id: 'thu_d2', prefix: 'B', name: 'Leg Extension', sets: 3, reps: '10–12', note: 'Slow eccentric. Safe for back.' },
        ]
      },
    ]
  },
  FRI: { type: 'tennis' },
  SAT: {
    title: 'Full Body 4',
    subtitle: 'Main Gym · ~55 min · Pull dominant',
    note: '⚑ Weighted pull-ups replaced with Gorilla Row this week — horizontal pull, no spinal compression. Barbell row dropped. Single arm DB row for back accessory.',
    blocks: [
      {
        label: 'BLOCK A', type: 'Main Compound — Standalone',
        exercises: [
          { id: 'sat_a1', prefix: '', name: 'Gorilla Row', sets: 4, reps: '8/side', note: 'Horizontal pull. Heavy anchor. Rotational demand. Brace core throughout.' },
        ]
      },
      {
        label: 'BLOCK B', type: 'Main Push — Standalone',
        exercises: [
          { id: 'sat_b1', prefix: '', name: 'Weighted Dips', sets: 3, reps: '8–10', note: 'Light added weight. Control descent.' },
        ]
      },
      {
        label: 'BLOCK C', type: 'Superset: Single Arm Row + Hinge',
        exercises: [
          { id: 'sat_c1', prefix: 'A', name: 'Single Arm DB Row', sets: 3, reps: '10/side', note: 'Supported on bench. Replaces barbell row — no bilateral spinal load.' },
          { id: 'sat_c2', prefix: 'B', name: 'KB Split Stance RDL', sets: 3, reps: '12/side', note: 'Light. Hinge pattern. Monitor back.' },
        ]
      },
      {
        label: 'BLOCK D', type: 'Superset: Chest + Rear Delt',
        exercises: [
          { id: 'sat_d1', prefix: 'A', name: 'Cable Chest Fly', sets: 3, reps: '12–15', note: 'Light. Fourth chest touch of the week.' },
          { id: 'sat_d2', prefix: 'B', name: 'Face Pull', sets: 3, reps: '12–15', note: 'Rotator cuff. Essential post-tennis.' },
        ]
      },
      {
        label: 'BLOCK E', type: 'Superset: Core + Bicep',
        exercises: [
          { id: 'sat_e1', prefix: 'A', name: 'Hanging Leg Raise', sets: 3, reps: '10–12', note: 'Only if back is feeling okay by Saturday.' },
          { id: 'sat_e2', prefix: 'B', name: 'Bayesian Bicep Curl', sets: 3, reps: '10–12', note: 'Full stretch at bottom.' },
        ]
      },
    ]
  },
  SUN: { type: 'rest' }
};

let currentWeek = 1;
let currentDay = 0;
const MAX_WEEKS = 4;

const PULLEY_EXERCISES = new Set([
  'Cable Chest Fly',
  'Cable Lateral Raise (Full ROM)',
  'Cable Tricep Overhead Extension',
  'Pallof Press',
  'Face Pull',
  'Single Arm Rear Delt Cable',
  'Bayesian Bicep Curl',
]);

// Fatigue emoji state — saves per session per exercise
function getFatigueKey(week, dayKey, exId) {
  return `alberto_w${week}_${dayKey}_${exId}_fatigue`;
}
function getFatigue(week, dayKey, exId) {
  return localStorage.getItem(getFatigueKey(week, dayKey, exId)) || '';
}
function setFatigue(week, dayKey, exId, value) {
  localStorage.setItem(getFatigueKey(week, dayKey, exId), value);
  render();
}

// DP toggle state — does NOT save, just in-memory for the session
const dpState = {};
function getDp(exId) { return dpState[exId] || false; }
function toggleDp(exId) { dpState[exId] = !dpState[exId]; render(); }

function getExUnitKey(dayKey, exId) {
  return `alberto_${dayKey}_${exId}_unit`;
}

function getExUnit(dayKey, exId) {
  return localStorage.getItem(getExUnitKey(dayKey, exId)) || 'kg';
}

function setExUnit(dayKey, exId, unit) {
  localStorage.setItem(getExUnitKey(dayKey, exId), unit);
  render();
}

function storageKey(week, dayKey, exId, setIdx, field) {
  return `alberto_w${week}_${dayKey}_${exId}_s${setIdx}_${field}`;
}

function saveValue(week, dayKey, exId, setIdx, field, value) {
  localStorage.setItem(storageKey(week, dayKey, exId, setIdx, field), value);
}

function loadValue(week, dayKey, exId, setIdx, field) {
  return localStorage.getItem(storageKey(week, dayKey, exId, setIdx, field)) || '';
}

function getDayCompletedKey(week, dayKey) {
  return `alberto_w${week}_${dayKey}_completed`;
}

function isDayCompleted(week, dayKey) {
  return localStorage.getItem(getDayCompletedKey(week, dayKey)) === '1';
}

function setDayCompleted(week, dayKey) {
  localStorage.setItem(getDayCompletedKey(week, dayKey), '1');
}

function getSetCountKey(week, dayKey, exId) {
  return `alberto_w${week}_${dayKey}_${exId}_setcount`;
}

function getSetCount(week, dayKey, exId, defaultCount) {
  const stored = localStorage.getItem(getSetCountKey(week, dayKey, exId));
  return stored ? parseInt(stored) : defaultCount;
}

function setSetCount(week, dayKey, exId, count) {
  localStorage.setItem(getSetCountKey(week, dayKey, exId), count);
}

function countCompletedDays(week) {
  return DAYS.filter(d => {
    const day = PROGRAM[d];
    if (!day || day.type === 'rest' || day.type === 'tennis') return false;
    return isDayCompleted(week, d);
  }).length;
}

function countTotalSessions(week) {
  return DAYS.filter(d => {
    const day = PROGRAM[d];
    return day && !day.type;
  }).length;
}

function renderWeekSummary() {
  const completed = countCompletedDays(currentWeek);
  const total = countTotalSessions(currentWeek);
  const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

  document.getElementById('weekSummary').innerHTML = `
    <div class="stat-card">
      <div class="stat-value">${completed}/${total}</div>
      <div class="stat-label">Sessions Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${currentWeek}/4</div>
      <div class="stat-label">Week</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${pct}%</div>
      <div class="stat-label">Week Progress</div>
    </div>
  `;
}

function renderTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  DAYS.forEach((d, i) => {
    const day = PROGRAM[d];
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    btn.textContent = d;
    if (i === currentDay) btn.classList.add('active');
    if (day.type === 'rest') btn.classList.add('rest');
    if (!day.type && isDayCompleted(currentWeek, d)) btn.classList.add('completed');
    btn.onclick = () => { currentDay = i; render(); };
    container.appendChild(btn);
  });
}

function renderDay() {
  const dayKey = DAYS[currentDay];
  const day = PROGRAM[dayKey];
  const container = document.getElementById('dayContent');

  if (day.type === 'rowing') {
    const saved = JSON.parse(localStorage.getItem(`alberto_w${currentWeek}_WED_rowing`) || '{}');
    const isComplete = isDayCompleted(currentWeek, 'WED');

    const fields = [
      { key: 'time',     label: 'Time Spent',  placeholder: 'e.g. 42:30',  unit: 'min' },
      { key: 'distance', label: 'Distance',     placeholder: 'e.g. 8200',   unit: 'm' },
      { key: 'pace',     label: 'Avg Pace',     placeholder: 'e.g. 2:05',   unit: '/500m' },
      { key: 'watts',    label: 'Avg Watts',    placeholder: 'e.g. 185',    unit: 'W' },
      { key: 'avghr',    label: 'Avg HR',       placeholder: 'e.g. 158',    unit: 'bpm' },
      { key: 'maxhr',    label: 'Max HR',       placeholder: 'e.g. 174',    unit: 'bpm' },
    ];

    let rows = fields.map(f => `
      <div class="rowing-field">
        <div class="rowing-field-label">${f.label}</div>
        <div class="rowing-field-input-wrap">
          <input
            type="text"
            class="rowing-input ${saved[f.key] ? 'filled' : ''}"
            placeholder="${f.placeholder}"
            value="${saved[f.key] || ''}"
            ${isComplete ? 'disabled' : ''}
            onchange="saveRowingField('${f.key}', this.value); this.classList.toggle('filled', !!this.value)">
          <span class="rowing-unit">${f.unit}</span>
        </div>
      </div>`).join('');

    container.innerHTML = `
      <div class="day-header">
        <div class="day-title">Wednesday — VO2 Max</div>
        <div class="day-subtitle">Main Gym · ~40 min · 4x4 Rowing Intervals</div>
        <div class="day-note">4 rounds · 4 min ~80% max HR · 4 min Zone 2 active recovery. Warm up with hip 90/90 rotations before starting.</div>
      </div>
      <div class="rowing-grid">${rows}</div>
      <button class="complete-btn ${isComplete ? 'done' : ''}"
        onclick="completeDay('WED')"
        ${isComplete ? 'disabled' : ''}>
        ${isComplete ? '✓ SESSION LOGGED' : 'MARK SESSION COMPLETE'}
      </button>`;
    return;
  }

  if (day.type === 'rest') {
    container.innerHTML = `
      <div class="rest-day">
        <h2>RECOVERY</h2>
        <p>Mobility · Zone 2 · Locked in · Do not change</p>
      </div>`;
    return;
  }

  if (day.type === 'tennis') {
    container.innerHTML = `
      <div class="tennis-day">
        <h2>🎾 TENNIS</h2>
        <p>Fixed day · No lifting · Flag knee if it flares during play</p>
      </div>`;
    return;
  }

  const completed = isDayCompleted(currentWeek, dayKey);
  let html = `
    <div class="day-header">
      <div class="day-title">${DAY_NAMES[currentDay]} — ${day.title}</div>
      <div class="day-subtitle">${day.subtitle}</div>
      ${day.note ? `<div class="day-note">${day.note}</div>` : ''}
    </div>
    <div class="injury-banner">⚠ LOW BACK (PIRIFORMIS) — Light loads this week. Higher reps. Stop any exercise that triggers discomfort.</div>
  `;

  day.blocks.forEach(block => {
    html += `<div class="block">
      <div class="block-header">
        <span class="block-label">${block.label}</span>
        <span class="block-type">${block.type}</span>
      </div>`;

    block.exercises.forEach((ex, ei) => {
      const supersetClass = ex.prefix === 'A' ? 'superset-a' : ex.prefix === 'B' ? 'superset-b' : '';
      const setCount = getSetCount(currentWeek, dayKey, ex.id, ex.sets);
      const exUnit = getExUnit(dayKey, ex.id);
      const isPulley = PULLEY_EXERCISES.has(ex.name);
      const dp = getDp(ex.id);
      const fatigue = getFatigue(currentWeek, dayKey, ex.id);

      html += `<div class="exercise-row ${supersetClass}">
        <div>
          <div class="ex-name">
            ${ex.prefix ? `<span class="ex-prefix">${ex.prefix}</span>` : ''}
            ${ex.name}
            ${isPulley ? `<button class="dp-tag ${dp ? 'active' : ''}" onclick="toggleDp('${ex.id}')" title="Double pulley">dp</button>` : ''}
          </div>
          <div class="ex-meta-row">
            <span class="ex-meta">${ex.sets} sets · ${ex.reps}</span>
            <select class="fatigue-select ${fatigue ? 'has-value' : ''}" 
              onchange="setFatigue(${currentWeek},'${dayKey}','${ex.id}',this.value)"
              ${completed ? 'disabled' : ''}>
              <option value="" ${fatigue === '' ? 'selected' : ''}>—</option>
              <option value="💀" ${fatigue === '💀' ? 'selected' : ''}>💀 Hard</option>
              <option value="☠️" ${fatigue === '☠️' ? 'selected' : ''}>☠️ Near failure</option>
            </select>
          </div>
          ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
        </div>
        <div class="ex-inputs" id="inputs_${ex.id}">
          <div class="sets-header">
            <div class="ex-unit-toggle">
              <button class="ex-unit-btn ${exUnit === 'kg' ? 'active' : ''}" onclick="setExUnit('${dayKey}','${ex.id}','kg')" ${completed ? 'disabled' : ''}>KG</button>
              <button class="ex-unit-btn ${exUnit === 'lbs' ? 'active' : ''}" onclick="setExUnit('${dayKey}','${ex.id}','lbs')" ${completed ? 'disabled' : ''}>LBS</button>
            </div>
            <span>REPS</span>
          </div>`;

      for (let s = 0; s < setCount; s++) {
        const w = loadValue(currentWeek, dayKey, ex.id, s, 'w');
        const r = loadValue(currentWeek, dayKey, ex.id, s, 'r');
        html += `
          <div class="set-row">
            <span class="set-label">${s + 1}</span>
            <input type="number" class="set-input ${w ? 'filled' : ''}" placeholder="${exUnit}"
              value="${w}"
              onchange="saveVal('${dayKey}','${ex.id}',${s},'w',this.value); this.classList.toggle('filled', !!this.value)"
              ${completed ? 'disabled' : ''}>
            <span class="set-divider">×</span>
            <input type="number" class="set-input ${r ? 'filled' : ''}" placeholder="reps"
              value="${r}"
              onchange="saveVal('${dayKey}','${ex.id}',${s},'r',this.value); this.classList.toggle('filled', !!this.value)"
              ${completed ? 'disabled' : ''}>
          </div>`;
      }

      if (!completed) {
        html += `<button class="add-set-btn" onclick="addSet('${dayKey}','${ex.id}',${setCount})">+ set</button>`;
      }

      html += `</div></div>`;
    });

    html += `</div>`;
  });

  html += `<button class="complete-btn ${completed ? 'done' : ''}" 
    onclick="completeDay('${dayKey}')" 
    ${completed ? 'disabled' : ''}>
    ${completed ? '✓ SESSION LOGGED' : 'MARK SESSION COMPLETE'}
  </button>`;

  container.innerHTML = html;
}

function saveRowingField(key, value) {
  const storKey = `alberto_w${currentWeek}_WED_rowing`;
  const existing = JSON.parse(localStorage.getItem(storKey) || '{}');
  existing[key] = value;
  localStorage.setItem(storKey, JSON.stringify(existing));
}

function saveVal(dayKey, exId, setIdx, field, value) {
  saveValue(currentWeek, dayKey, exId, setIdx, field, value);
}

function addSet(dayKey, exId, currentCount) {
  setSetCount(currentWeek, dayKey, exId, currentCount + 1);
  render();
}

function completeDay(dayKey) {
  setDayCompleted(currentWeek, dayKey);
  render();
}

function changeWeek(dir) {
  const next = currentWeek + dir;
  if (next < 1 || next > MAX_WEEKS) return;
  currentWeek = next;
  document.getElementById('weekLabel').textContent = `WK ${currentWeek}`;
  render();
}

function render() {
  renderTabs();
  renderWeekSummary();
  renderDay();
}

// Start on today's day if possible
const today = new Date().getDay(); // 0=Sun
const dayMap = [6, 0, 1, 2, 3, 4, 5]; // JS day -> our index
currentDay = dayMap[today];

render();
</script>
</body>
</html>
